body:
  text: 續道藏經目録英五正一部杜字號計六卷太上中道玅法道華經三卷太上元始天尊說寶月光皇后聖毋孔雀明王經三卷藁字號計四卷上清元始變化寳真上經一卷太上老君開天經一卷太上老君虛無自然本起經一卷洞玄靈寶玉京山步虚經一卷鍾字號計十卷髙上玉皇本行集經註録字號計九卷元始天尊說東嶽化身濟生度死㧞罪解寃保命玅經一卷太上三元賜福赦罪觧厄消災延生保命妙經一卷太上元陽上帝無始天專說火車王靈官真經一卷元始天尊說藥王救八十一難真經一卷碧霞元君護國庇民普濟保生玅經一卷太上大聖朗靈上將護國開王玅經一卷護國保寧佑聖王威靈公感應城隍經太上洞玄靈寶王顯靈觀華光本行玅經太上說通真高皇解寃經中天紫徽星真寶懴一卷漆字號計四卷紫皇煉度玄科一卷先天斗姆奏告玄科一卷朝真發𦖦懴悔文一卷靈寶施食法太徽帝君二十四神回元經一卷北斗九皇隠諱經高上玉宸樂章太上洞真徊玄章上清金章十二篇太上洞玄濟衆經大通經吉祥神咒書字號計四卷皇明恩命世録四卷璧字號計四卷漢天師世家一之四經字號計七卷弘道録一之八府字號計八卷弘道録九之十六羅字號計八卷弘道録十七之二十四將字號計八卷弘道録一十五之二十二相字號計八卷弘道録三十五之四十路字號計八卷弘道録四十一之四十三俠字號計九卷弘道録四十九之玉十七槐字號計四卷逍遙墟二卷長生詮一卷無生訣一卷郷字號計四卷徐仙翰藻一之十四户字號計三卷徐仙真録一之五封字號計四卷堪興完孝録元元真八字號計三卷岱史一之九賤字號計四卷岱吏十之十八家字號計三卷李氏易因有卦圖給字號計六卷李氏易因三卷古易考原三卷千字號計五卷焦氏易林有卦兵字號計五卷焦氏易林有卦高字號計六卷搜神記冠字號計五卷太初元氣接要保生論一卷譚子化書一卷水鏡録一卷玉匣記一卷玄帝感應靈籖一卷陪字號計八卷天皇至道太清玉冊輦字號計六卷吕祖誌驅字號計三卷紫徽斗數軗字號計五卷老子翼振字號計四卷老子翼纓字號計五卷荘子翼大明續道藏經目録大明萬暦三十五年歲次丁未上元吉日正一嗣教疑誠志道閳玄弘教大真人掌天下道教事張國祥奉㫖校梓靈佑宫供奉
